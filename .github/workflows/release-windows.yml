# Construit l’installateur Windows NSIS (Python embarqué) et le joint aux Releases sur tag v*,
# ou le dépose en artefact de workflow (exécution manuelle).
name: Release Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build NSIS installer (embedded Python)
        run: npm run dist:win

      - name: Regression export image (Python embeddé + build packagé)
        run: npm run test:embedded-python && npm run test:packaged-export

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: editify-windows-setup
          path: EditraDoc-Setup.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: EditraDoc-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
