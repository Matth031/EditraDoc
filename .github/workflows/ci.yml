name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libnss3 libgbm1

      - name: Install python deps
        run: python -m pip install --upgrade pip && python -m pip install -r python/requirements.txt

      - name: Install node deps
        run: npm ci

      - name: Build geometry IIFE (tsc)
        run: npm run build:geometry

      - name: Check geometry artifact drift
        run: npm run check:geometry-artifact

      - name: Geometry contract harness (bad call must fail tsc)
        run: npm run test:geometry-contract

      - name: Build IPC contracts (tsc CJS + JSON Schema)
        run: npm run build:contracts

      - name: Check contracts artifact drift
        run: npm run check:contracts-artifact

      - name: Contracts harness (bad call must fail tsc)
        run: npm run test:contracts-contract

      - name: npm audit (high+)
        run: npm run test:audit

      - name: Verify dev assets
        run: npm run test:verify-assets

      - name: Prettier check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run unit/integration tests
        run: npm test

      - name: Run node unit tests (shape parity, libs)
        run: npm run test:node

      - name: Run electron smoke e2e
        run: xvfb-run -a npm run e2e
        env:
          ELECTRON_DISABLE_GPU: "1"

      - name: Build package (dir)
        run: npm run build
